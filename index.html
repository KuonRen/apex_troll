<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>APEXトロールガチャ | Compact Edition</title>
  <style>

    :root {
      --bg-1: #020202;
      --bg-2: #09090b;
      --bg-3: #140507;
      --panel: rgba(12, 12, 14, 0.92);
      --panel-2: rgba(18, 18, 21, 0.96);
      --line: rgba(255, 255, 255, 0.08);
      --line-strong: rgba(255, 77, 77, 0.34);
      --text: #f5f7fb;
      --muted: #989da8;
      --accent: #b70f2a;
      --accent-2: #ff4d4d;
      --accent-soft: rgba(183, 15, 42, 0.16);
      --accent-glow: rgba(255, 77, 77, 0.22);
      --warning: #ff9a3d;
      --success: #ff7b7b;
      --shadow: 0 24px 64px rgba(0, 0, 0, 0.56);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      scrollbar-width: thin;
      scrollbar-color: rgba(255, 77, 77, 0.72) rgba(255, 255, 255, 0.06);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      border-radius: 999px;
      background: linear-gradient(180deg, #700b19, #ff4d4d);
      border: 2px solid rgba(6, 6, 7, 0.95);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #980f22, #ff7171);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Inter", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 14% 12%, rgba(255, 77, 77, 0.17), transparent 24%),
        radial-gradient(circle at 88% 0%, rgba(183, 15, 42, 0.18), transparent 22%),
        linear-gradient(145deg, var(--bg-1) 0%, var(--bg-2) 58%, var(--bg-3) 100%);
      height: 100svh;
      padding: 12px;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.024) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.024) 1px, transparent 1px),
        linear-gradient(120deg, transparent 0 64%, rgba(255, 77, 77, 0.08) 64% 65%, transparent 65% 100%);
      background-size: 40px 40px, 40px 40px, cover;
      mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), transparent 96%);
    }

    .app {
      width: min(1420px, 100%);
      height: 100%;
      margin: 0 auto;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
    }

    .hero,
    .panel,
    .results-panel {
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, var(--panel-2), var(--panel));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      isolation: isolate;
    }

    .hero::before,
    .panel::before,
    .results-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-2), transparent);
      opacity: 0.95;
      pointer-events: none;
    }

    .hero::after,
    .panel::after,
    .results-panel::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(255, 77, 77, 0.12), transparent 28%),
        linear-gradient(135deg, rgba(255, 77, 77, 0.06), transparent 22%);
      opacity: 0.8;
    }

    .hero {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      min-height: 82px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      margin-bottom: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 77, 77, 0.32);
      background: rgba(183, 15, 42, 0.16);
      color: #ffd2d2;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 3vw, 40px);
      line-height: 1;
      letter-spacing: -0.04em;
      text-shadow: 0 0 18px rgba(255, 77, 77, 0.12);
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 390px) minmax(0, 1fr);
      gap: 12px;
      min-height: 0;
    }

    .panel,
    .results-panel {
      padding: 16px;
      min-height: 0;
    }

    .controls-panel,
    .results-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .panel h2,
    .results-panel h2 {
      margin: 0;
      font-size: 15px;
      letter-spacing: 0.02em;
    }

    .input-grid {
      display: grid;
      gap: 10px;
    }

    .input-card {
      padding: 10px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.02));
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
    }

    .input-card label {
      display: block;
      margin-bottom: 6px;
      color: #c5c8d2;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    input {
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background: rgba(5, 5, 7, 0.94);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 13px;
      outline: none;
      transition: border-color 180ms ease, box-shadow 180ms ease, transform 180ms ease, background 180ms ease;
      font-size: 15px;
    }

    input::placeholder {
      color: #727886;
    }

    input:focus {
      border-color: rgba(255, 77, 77, 0.62);
      box-shadow: 0 0 0 4px rgba(183, 15, 42, 0.16), 0 0 18px rgba(255, 77, 77, 0.12);
      transform: translateY(-1px);
      background: rgba(8, 8, 10, 0.98);
    }

    .actions {
      display: grid;
      gap: 8px;
    }

    button {
      position: relative;
      overflow: hidden;
      border: 0;
      cursor: pointer;
      color: white;
      border-radius: 14px;
      padding: 12px 16px;
      font-weight: 800;
      letter-spacing: 0.03em;
      transition: transform 180ms ease, box-shadow 180ms ease, opacity 180ms ease, border-color 180ms ease;
    }

    button::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(120deg, transparent 25%, rgba(255, 255, 255, 0.12) 50%, transparent 75%);
      transform: translateX(-120%);
      transition: transform 260ms ease;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:hover::before {
      transform: translateX(120%);
    }

    .primary-btn {
      background: linear-gradient(135deg, #8f0e22, #ff4d4d);
      box-shadow: 0 16px 30px rgba(183, 15, 42, 0.34);
    }

    .ghost-btn {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 77, 77, 0.18);
      color: var(--text);
    }

    .ghost-btn:hover {
      box-shadow: 0 10px 24px rgba(183, 15, 42, 0.14);
      border-color: rgba(255, 77, 77, 0.32);
    }

    .hint {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .hint code {
      color: #ffd7d7;
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.14);
      border-radius: 8px;
      padding: 2px 6px;
    }

    .result-list {
      display: grid;
      gap: 10px;
      min-height: 0;
      overflow: auto;
      padding-right: 6px;
    }

    .result-card {
      position: relative;
      overflow: hidden;
      padding: 14px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02));
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.03);
      animation: rise 360ms ease;
    }

    .result-card::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      border-radius: 999px;
      background: currentColor;
      opacity: 0.96;
      box-shadow: 0 0 14px currentColor;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(10px) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .result-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .player-name {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      white-space: nowrap;
    }

    .legend {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      background: rgba(255, 77, 77, 0.09);
      border: 1px solid rgba(255, 77, 77, 0.18);
      color: #ffb1b1;
      font-weight: 700;
      font-size: 12px;
    }

    .mission {
      font-size: clamp(16px, 1.3vw, 21px);
      line-height: 1.35;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta-chip {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .placeholder {
      min-height: 100%;
      display: grid;
      place-items: center;
      color: var(--muted);
      text-align: center;
      border: 1px dashed rgba(255, 77, 77, 0.2);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      padding: 20px;
    }

    .rarity-ultra { color: #ff9c9c; }
    .rarity-super { color: #ff4d4d; }
    .rarity-rare { color: #ff9a3d; }
    .rarity-normal { color: #d2d5dc; }

    .rarity-ultra .badge { background: rgba(255, 156, 156, 0.12); border-color: rgba(255, 156, 156, 0.26); }
    .rarity-super .badge { background: rgba(255, 77, 77, 0.12); border-color: rgba(255, 77, 77, 0.24); }
    .rarity-rare .badge { background: rgba(255, 154, 61, 0.12); border-color: rgba(255, 154, 61, 0.22); }
    .rarity-normal .badge { background: rgba(255, 255, 255, 0.07); border-color: rgba(255, 255, 255, 0.12); }

    body.flash {
      animation: ultraPulse 500ms ease 3;
    }

    @keyframes ultraPulse {
      0% { filter: saturate(1) brightness(1); }
      50% { filter: saturate(1.22) brightness(1.05); }
      100% { filter: saturate(1) brightness(1); }
    }

    @media (max-width: 900px) {
      body {
        height: auto;
        min-height: 100svh;
        overflow: auto;
      }

      .app {
        height: auto;
      }

      .layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

      { key: "ultra", label: "💎 ウルトラレア", className: "rarity-ultra", rate: 0.05 },
      { key: "super", label: "🔥 スーパーレア", className: "rarity-super", rate: 0.3 },
      { key: "rare", label: "✨ レア", className: "rarity-rare", rate: 0.5 },
      { key: "normal", label: "⚪ ノーマル", className: "rarity-normal", rate: 0.15 }
    ];

    const sampleNames = ["レン", "ノヴァ", "ルーク", "カイ", "ミナト", "アオ", "ハル", "レイ"];

    const playerNameStorageKey = "apexTrollGacha.playerNames";

    function buildItems(poolKey) {
      return basePools[poolKey].map((text) => ({
        text,
        weight: weightOverrides[poolKey][text] ?? 1
      }));
    }

    function getPreparedPools() {
      return rarityConfigs.map((rarity) => {
        const items = buildItems(rarity.key);
        const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
        return {
          ...rarity,
          items: items.map((item) => ({
            ...item,
            finalRate: rarity.rate * (item.weight / totalWeight)
          }))
        };
      });
    }

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function pickWeighted(items) {
      const totalWeight = items.reduce((sum, item) => sum + item.weight, 0);
      let threshold = Math.random() * totalWeight;

      for (const item of items) {
        threshold -= item.weight;
        if (threshold <= 0) return item;
      }

      return items[items.length - 1];
    }

    function pickRarity(pools) {
      const roll = Math.random();
      let cumulative = 0;
      for (const rarity of pools) {
        cumulative += rarity.rate;
        if (roll < cumulative) return rarity;
      }
      return pools[pools.length - 1];
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(value < 0.01 ? 3 : 2)}%`;
    }

    function getPlayerNameInputs() {
      return [...document.querySelectorAll("#inputs input")];
    }

    function savePlayerNames() {
      try {
        const playerNames = getPlayerNameInputs().map((input) => input.value);
        localStorage.setItem(playerNameStorageKey, JSON.stringify(playerNames));
      } catch (error) {
        console.warn("Failed to save player names.", error);
      }
    }

    function loadPlayerNames() {
      try {
        const savedValue = localStorage.getItem(playerNameStorageKey);
        if (!savedValue) return;

        const playerNames = JSON.parse(savedValue);
        if (!Array.isArray(playerNames)) return;

        getPlayerNameInputs().forEach((input, index) => {
          input.value = typeof playerNames[index] === "string" ? playerNames[index] : "";
        });
      } catch (error) {
        console.warn("Failed to load player names.", error);
      }
    }

    function initPlayerNamePersistence() {
      loadPlayerNames();
      getPlayerNameInputs().forEach((input) => {
        input.addEventListener("input", savePlayerNames);
      });
    }

    function clearNames() {
      getPlayerNameInputs().forEach((input) => {
        input.value = "";
      });
      savePlayerNames();
    }

    function fillRandomNames() {
      const inputs = getPlayerNameInputs();
      const names = shuffle([...sampleNames]);
      inputs.forEach((input, index) => {
        input.value = names[index] ?? `プレイヤー${index + 1}`;
      });
    }

    function draw() {
      const inputs = document.querySelectorAll("#inputs input");
      const result = document.getElementById("result");
      const preparedPools = getPreparedPools();
      const shuffledLegends = shuffle([...legends]);

      document.body.classList.remove("flash");

      const cards = [...inputs].map((input, index) => {
        const playerName = input.value.trim() || input.placeholder || `プレイヤー${index + 1}`;
        const legend = shuffledLegends[index % shuffledLegends.length];
        const rarity = pickRarity(preparedPools);
        const mission = pickWeighted(rarity.items);

        if (rarity.key === "ultra") {
          document.body.classList.add("flash");
        }

        return `
          <article class="result-card ${rarity.className}">
            <div class="result-head">
              <div class="player-name">${playerName}</div>
              <span class="badge">${rarity.label}</span>
            </div>
            <div class="legend">使用レジェンド：${legend}</div>
            <div class="mission">${mission.text}</div>
            <div class="meta">
              <span class="meta-chip">個別排出率: ${formatPercent(mission.finalRate)}</span>
              <span class="meta-chip">レア度排出率: ${formatPercent(rarity.rate)}</span>
              <span class="meta-chip">weight: ${mission.weight}</span>
            </div>
          </article>
        `;
      }).join("");

      result.innerHTML = cards;
    }

    initPlayerNamePersistence();
  </script>
</body>
</html>
